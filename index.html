<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Novel → မြန်မဘာသာပြန်</title>
  <style>
    body {
      font-family: 'Pyidaungsu', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      color: #222;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    textarea, #output {
      width: 100%;
      min-height: 180px;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 12px;
      box-sizing: border-box;
      background: white;
    }
    #output {
      background: #fffef0;
      border-color: #d4a017;
      white-space: pre-wrap;
    }
    button {
      background: #27ae60;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 17px;
      border-radius: 8px;
      cursor: pointer;
      display: block;
      margin: 10px auto;
    }
    button:hover {
      background: #219653;
    }
    button:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }
    #status {
      text-align: center;
      font-style: italic;
      color: #7f8c8d;
      min-height: 1.4em;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>English Novel ကို မြန်မာလို ဘာသာပြန်ပေးမယ်</h1>

  <textarea id="input" placeholder="ဘာသာပြန်ချင်တဲ့ English စာပိုဒ် / အပိုင်းကို ဒီမှာ ကူးထည့်ပါ... (၅၀၀-၁၅၀၀ စကားလုံးလောက်ထိ အကောင်းဆုံး)"></textarea>

  <button id="translateBtn">ဘာသာပြန်မယ် →</button>

  <div id="status">အဆင်သင့်ပါ။ စာသားထည့်ပြီး ခလုတ်နှိပ်ပါ။</div>

  <div id="output" style="display:none;"></div>
</div>

<script type="module">
  // ────────────────────────────────────────────────
  //  ဒီနေရာမှာ သင့် API Key ကို ထည့်ပါ
  const GEMINI_API_KEY = "AIzaSyCtw5FDmaz9j8UQfLF0OSu_N905vFempPc";   // ←←← ဒီနေရာကို ပြင်ပါ
  // ────────────────────────────────────────────────

  const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=" + GEMINI_API_KEY;

  const systemInstruction = `
မင်းဟာ မြန်မာစာပေနဲ့ အဂ်လိပ်စာပေကို နှစ်ပေါင်းများစွာ လေ့လာထားတဲ့ ပရော်ဖက်ရှင်နယ် စာပေဘာသာပြန်ဆရာ တစ်ယောက်ပါ။ 
မြန်မာစာဖတ်သူတွေ အတွက် အသုံးအများဆုံး၊ သဘာဝကျကျ၊ ခံစားမှုပါဝင်ပြီး စီးဆင်းမှု ကောင်းတဲ့ စကားလုံးတွေ၊ စကားစုတွေကိုပဲ အမြဲသုံးပါ။

ဘာသာပြန်တဲ့အခါ အောက်ပါ အချက်တွေကို တစ်ချိန်တည်း လိုက်နာပါ။
1. စကားလုံးတိုင်းကို တိုက်ရိုက်ဘာသာမပြန်ပါနဲ့။ မြန်မာစာဖတ်သူ သဘာဝအတိုင်း ခံစားရအောင် ပြန်ဆိုပါ။
2. စာပေဆန်ဆန် ဖြစ်အောင် လုပ်ပါ။ ဇာတ်ကောင်ရဲ့ ခံစားချက်၊ မြင်ကွင်း၊ အသံ၊ အနံ့ စတဲ့ အသေးစိတ်တွေ ထင်ရှားစေပါ။
3. မြန်မာစကားပြောဟန် သို့မဟုတ် စာပေစကားဟန်ကို ဇာတ်ကောင်နဲ့ အခြေအနေအလိုက် သင့်တော်အောင် ပြောင်းပါ။
4. အင်္ဂလိပ်စာလုံး အတိုက်အခံ မဖြစ်အောင် ရှောင်ပါ။
5. မူရင်း စာသားရဲ့ ခံစားမှု၊ လေသံ၊ ဟာသပါရင် ဟာသ၊ ဝမ်းနည်းစရာဆို ဝမ်းနည်းစရာ ခံစားမှုကို ထိန်းထားပါ။
6. ရလဒ်ကို မြန်မာစာသားသန့်သန့်ပဲ ထုတ်ပေးပါ။ ရှင်းလင်းချက်၊ မှတ်ချက်၊ အင်္ဂလိပ်စာ လုံးဝ မထည့်ပါနဲ့။

အခု အောက်မှာ ပေးမယ့် အင်္ဂလိပ်စာသားကို အထက်ပါ စည်းကမ်းတွေနဲ့ အတိအကျ မြန်မာစာသို့ ဘာသာပြန်ပေးပါ။
`;

  const inputEl   = document.getElementById("input");
  const outputEl  = document.getElementById("output");
  const btn       = document.getElementById("translateBtn");
  const statusEl  = document.getElementById("status");

  btn.addEventListener("click", async () => {
    const text = inputEl.value.trim();
    if (!text) {
      alert("ဘာသာပြန်ချင်တဲ့ စာသားကို ထည့်ပေးပါ။");
      return;
    }

    btn.disabled = true;
    statusEl.textContent = "ဘာသာပြန်နေပါပြီ... ခဏလေး စောင့်ပါ။";
    outputEl.style.display = "none";
    outputEl.textContent = "";

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            {
              role: "user",
              parts: [
                { text: systemInstruction + "\n\n===================\n\n" + text }
              ]
            }
          ],
          generationConfig: {
            temperature: 0.7,
            topK: 40,
            topP: 0.95,
            maxOutputTokens: 2048,
          }
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || "API ခေါ်မရပါ");
      }

      const data = await response.json();
      const translated = data.candidates?.[0]?.content?.parts?.[0]?.text || "(ဘာမှ မထွက်လာပါ)";

      outputEl.textContent = translated.trim();
      outputEl.style.display = "block";
      statusEl.textContent = "ပြီးပါပြီ ✓";
    } catch (err) {
      console.error(err);
      statusEl.textContent = "အမှားတစ်ခု ဖြစ်သွားပါပြီ: " + err.message;
    } finally {
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
